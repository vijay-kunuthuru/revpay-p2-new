name: CI Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # manual trigger add deploy button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('revpay/**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build backend
      working-directory: revpay
      run: mvn -B clean package -DskipTests -X

    - name: Build frontend
      uses: actions/setup-node@v3
      with:
        node-version: '24'

    - name: Install and build Angular
      working-directory: RevPay-P2-Frontend
      run: |
        npm install --verbose
        npm run build -- --configuration production --verbose

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Validate EC2 secrets are configured
      run: |
        if [ -z "${{ secrets.EC2_SSH_KEY }}" ] || [ -z "${{ secrets.EC2_USER }}" ] || [ -z "${{ secrets.EC2_HOST }}" ]; then
          echo "ERROR: EC2 secrets not configured!"
          echo "Please add the following secrets to your GitHub repository:"
          echo "  - EC2_SSH_KEY: Your EC2 private key (PEM file content)"
          echo "  - EC2_USER: SSH username (usually 'ubuntu')"
          echo "  - EC2_HOST: EC2 public IP or DNS name"
          exit 1
        fi

    - name: Copy SSH key
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

    - name: Deploy to EC2
      run: |
        echo "Deploying to EC2 instance: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}"
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' < deploy.sh
        echo "Deployment complete!"
